<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#c6f3ff">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;600;700;800&family=Roboto:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/blueskyusf-code/yeahblu3mediastorage@main/style.css">
    <title>Turma do Yeah Blu3 - Página do canal</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Turma do Yeah Blu3",
        "copyrightHolder": {
          "@type": "Organization",
          "name": "Equipe Yeah Blu3"

        "copyrightYear": "2026"
      }

    <style>
      .container {
        background-color: rgb(0,91,118);
        display: flex;
        justify-content: center;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }
      hr {
        width: 200px;
      }
      body {
    font-family: 'Poppins', sans-serif;
}
h1 {
    font-family: 'Poppins', sans-serif;
}
p {
    font-family: 'Reboto', sans-serif;
}
button {
   font-family: 'Poppins', sans-serif;
   font-weight: 600;
   background-color: hsl(207.9, 100%, 88.9%);;
   color: hsl(191, 100%, 15%);
   border: none;
   padding: 10px 24px;
   border-radius: 8px;
}
    </style>
    <script>
      function solicitarPermissao() {
  if (!("Notification" in window)) {
    alert("Este navegador não suporta notificações.");
    return;
  }
  Notification.requestPermission().then((permissao) => {
    if (permissao === "granted") {
      alert("Permissão concedida! As notificações foram ativadas.");
    } else if (permissao === "denied") {
      alert("Permissão negada. Você pode ativar manualmente nas configurações do navegador.");
    }
  });
}
    </script>
    <link rel="icon" type="image/png" href="https://i.ibb.co/Xfzzs9SS/76-Sem-T-tulo-20260610205802.png">
  </head>
  <body>
    <div class="container">
      <h2>Permita que o nosso site acesse as notificações</h2>
      <p>Quando você ativar as notificações, o site será permitido mandar notificações sobre as notícias</p>
      <b>Aperte aqui para permitir ↓</b>
      <br>
      <button onclick="solicitarPermissao()">Permitir</button>
 </div>
  </body>
</html>
