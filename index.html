    <style>
      .container {
        background-color: rgb(0,91,118);
        display: flex;

        body {

}
h1 {
    font-family: 'Poppins', sans-serif;
}
p {
    font-family: 'Reboto', sans-serif;
}
button {
   font-family: 'Poppins', sans-serif;
   font-weight: 600;
   background-color: hsl(207.9, 100%, 88.9%);
   color: hsl(191, 100%, 15%);
   border: none;
   padding: 10px 15px; 
   width: 90%;         
   max-width: 300px;
   border-radius: 8px;
}

input {
   font-family: 'Poppins', sans-serif;
   font-weight: 600;
   background-color: hsl(193.7,100%,93.9%);
   color: hsl(191, 100%, 15%);
   border: none;
   padding: 10px 15px;

    <meta name="google-site-verification" content="-au6PyXA0-tKm8s1UbPvqBNGuBImZQAfWeLd6hR3brw" />

  </head>
  <body>
    <div class="container">
      <h1>Turma do Yeah Blu3</h1>
      <p id="p1">Seja bem vindo ao site oficial do Turma do Yeah Blu3!</p>
      <br>
      <div class="form-group">
      <input type="text" id="name" placeholder="Digite seu nome...">
      <button onclick="saveData()" id="buttonsave">Salvar</button>
  </div>
      <h2 id="welcome"></h2>
      <button onclick="acessarcanal()" id="channel">Canal</button>
      <br>
      <footer>
        <h6>Página criado no Github</h6>
      </footer>
      <script>
function acessarcanal() {
  window.location.href = "/canal/";
}
const inputName = document.getElementById("name");
const buttonSave = document.getElementById("buttonsave");
const buttonChannel = document.getElementById("channel");
const welcomeElement = document.getElementById("welcome");

document.addEventListener("DOMContentLoaded", function() {
    let dadoSalvo = localStorage.getItem("nomeUsuario");
    
    if (dadoSalvo) {
        if (inputName) inputName.style.display = "none";
        if (buttonSave) buttonSave.style.display = "none";
        
        if (buttonChannel) {
            buttonChannel.style.display = "inline-block";
            buttonChannel.disabled = false;
        }
        
        if (welcomeElement) {
            welcomeElement.textContent = "Bem-vindo de volta, " + dadoSalvo + "!";
        }
    } else {
        if (buttonChannel) {
            buttonChannel.style.display = "none";
            buttonChannel.disabled = true;
        }
    }
});

function saveData() {
    let valorDigitado = inputName.value.trim();

    if (valorDigitado !== "") {
        localStorage.setItem("nomeUsuario", valorDigitado);
        
        if (inputName) inputName.style.display = "none";
        if (buttonSave) buttonSave.style.display = "none";
        
        if (buttonChannel) {
            buttonChannel.style.display = "inline-block";
            buttonChannel.disabled = false;
        }
        
        if (welcomeElement) {
            welcomeElement.textContent = "Bem-vindo de volta, " + valorDigitado + "!";
        }
    }
}


      </script>
      </div>
  </body>
</html>
